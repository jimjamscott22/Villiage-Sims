<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="uarrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#a8b5aa"/></marker>
  </defs>
  <rect width="880" height="470" rx="16" fill="#17211b"/>
  <text x="28" y="40" fill="#f7f4e9" font-size="20" font-weight="700">How a villager decides — utility scoring</text>
  <text x="28" y="62" fill="#a8b5aa" font-size="13">Every candidate action scores 0–1. The highest wins, but only if it beats the current one by 0.15 (hysteresis).</text>

  <!-- Needs panel -->
  <g transform="translate(28,92)">
    <rect width="250" height="330" rx="12" fill="#22301f" stroke="#3a4d36"/>
    <text x="18" y="30" fill="#f7f4e9" font-size="15" font-weight="700">Needs decay each tick</text>

    <g font-size="12">
      <!-- hunger -->
      <text x="18" y="70" fill="#f7f4e9">Hunger</text>
      <rect x="18" y="78" width="214" height="12" rx="6" fill="#2c3d29"/>
      <rect x="18" y="78" width="64" height="12" rx="6" fill="#e05a3a"/>
      <text x="232" y="88" fill="#a8b5aa" text-anchor="end">0.30</text>

      <!-- energy -->
      <text x="18" y="120" fill="#f7f4e9">Energy</text>
      <rect x="18" y="128" width="214" height="12" rx="6" fill="#2c3d29"/>
      <rect x="18" y="128" width="120" height="12" rx="6" fill="#5aa0d0"/>
      <text x="232" y="138" fill="#a8b5aa" text-anchor="end">0.56</text>

      <!-- social -->
      <text x="18" y="170" fill="#f7f4e9">Social</text>
      <rect x="18" y="178" width="214" height="12" rx="6" fill="#2c3d29"/>
      <rect x="18" y="178" width="170" height="12" rx="6" fill="#c084e0"/>
      <text x="232" y="188" fill="#a8b5aa" text-anchor="end">0.79</text>

      <!-- happiness -->
      <text x="18" y="212" fill="#f7f4e9">Happiness</text>
      <rect x="18" y="220" width="214" height="12" rx="6" fill="#2c3d29"/>
      <rect x="18" y="220" width="130" height="12" rx="6" fill="#8fce4f"/>
      <text x="232" y="230" fill="#a8b5aa" text-anchor="end">derived</text>
    </g>

    <line x1="18" y1="252" x2="232" y2="252" stroke="#3a4d36"/>
    <text x="18" y="278" fill="#a8b5aa" font-size="11">World context feeds scoring:</text>
    <text x="18" y="298" fill="#f7f4e9" font-size="11">· food in storage?</text>
    <text x="18" y="316" fill="#f7f4e9" font-size="11">· night-time? (20:00–06:00)</text>
    <text x="130" y="298" fill="#f7f4e9" font-size="11">· nearest job + distance</text>
    <text x="130" y="316" fill="#f7f4e9" font-size="11">· a partner within 8 tiles?</text>
  </g>

  <!-- Actions column -->
  <g transform="translate(320,92)" font-size="12">
    <text x="0" y="20" fill="#f7f4e9" font-size="15" font-weight="700">Candidate actions</text>

    <!-- Eat (winner) -->
    <g transform="translate(0,34)">
      <rect width="330" height="46" rx="8" fill="#2c3d29" stroke="#e8a33d" stroke-width="2"/>
      <text x="14" y="20" fill="#e8a33d" font-weight="700">Eat</text>
      <text x="14" y="38" fill="#a8b5aa" font-size="10.5">(1 − hunger)² · gated on food available</text>
      <rect x="200" y="15" width="90" height="14" rx="7" fill="#1a2618"/>
      <rect x="200" y="15" width="44" height="14" rx="7" fill="#e8a33d"/>
      <text x="300" y="26" fill="#e8a33d" font-weight="700">0.49</text>
    </g>
    <!-- Sleep -->
    <g transform="translate(0,88)">
      <rect width="330" height="46" rx="8" fill="#22301f" stroke="#3a4d36"/>
      <text x="14" y="20" fill="#f7f4e9" font-weight="700">Sleep</text>
      <text x="14" y="38" fill="#a8b5aa" font-size="10.5">(1 − energy)² · ×1.5 at night</text>
      <rect x="200" y="15" width="90" height="14" rx="7" fill="#1a2618"/>
      <rect x="200" y="15" width="17" height="14" rx="7" fill="#5aa0d0"/>
      <text x="300" y="26" fill="#a8b5aa" font-weight="700">0.19</text>
    </g>
    <!-- Work -->
    <g transform="translate(0,142)">
      <rect width="330" height="46" rx="8" fill="#22301f" stroke="#3a4d36"/>
      <text x="14" y="20" fill="#f7f4e9" font-weight="700">Work</text>
      <text x="14" y="38" fill="#a8b5aa" font-size="10.5">0.4 · priority/10 · 1/(1+dist·0.05)</text>
      <rect x="200" y="15" width="90" height="14" rx="7" fill="#1a2618"/>
      <rect x="200" y="15" width="30" height="14" rx="7" fill="#7fae5b"/>
      <text x="300" y="26" fill="#a8b5aa" font-weight="700">0.34</text>
    </g>
    <!-- Socialize -->
    <g transform="translate(0,196)">
      <rect width="330" height="46" rx="8" fill="#22301f" stroke="#3a4d36"/>
      <text x="14" y="20" fill="#f7f4e9" font-weight="700">Socialize</text>
      <text x="14" y="38" fill="#a8b5aa" font-size="10.5">(1 − social)^1.5 · gated on partner ≤ 8 tiles</text>
      <rect x="200" y="15" width="90" height="14" rx="7" fill="#1a2618"/>
      <rect x="200" y="15" width="9" height="14" rx="7" fill="#c084e0"/>
      <text x="300" y="26" fill="#a8b5aa" font-weight="700">0.10</text>
    </g>
    <!-- Wander -->
    <g transform="translate(0,250)">
      <rect width="330" height="46" rx="8" fill="#22301f" stroke="#3a4d36"/>
      <text x="14" y="20" fill="#f7f4e9" font-weight="700">Wander</text>
      <text x="14" y="38" fill="#a8b5aa" font-size="10.5">constant 0.05 · the floor that prevents idling</text>
      <rect x="200" y="15" width="90" height="14" rx="7" fill="#1a2618"/>
      <rect x="200" y="15" width="5" height="14" rx="7" fill="#8a9489"/>
      <text x="300" y="26" fill="#a8b5aa" font-weight="700">0.05</text>
    </g>
  </g>

  <!-- Decision -->
  <g transform="translate(690,92)">
    <line x1="-32" y1="35" x2="6" y2="35" stroke="#a8b5aa" stroke-width="2" marker-end="url(#uarrow)"/>
    <rect width="160" height="330" rx="12" fill="#1a2618" stroke="#e8a33d" stroke-width="1.5"/>
    <text x="80" y="34" fill="#e8a33d" font-size="14" font-weight="700" text-anchor="middle">pick highest</text>

    <g transform="translate(30,70)">
      <circle cx="50" cy="50" r="46" fill="#22301f" stroke="#e8a33d" stroke-width="2"/>
      <circle cx="50" cy="42" r="16" fill="#e8a33d"/>
      <rect x="34" y="58" width="32" height="26" rx="10" fill="#e8a33d"/>
      <text x="50" y="118" fill="#e8a33d" font-size="15" font-weight="700" text-anchor="middle">Eat</text>
    </g>

    <line x1="20" y1="212" x2="140" y2="212" stroke="#3a4d36"/>
    <text x="80" y="238" fill="#f7f4e9" font-size="11" text-anchor="middle" font-weight="600">Hysteresis 0.15</text>
    <text x="80" y="258" fill="#a8b5aa" font-size="10" text-anchor="middle">a new action must beat</text>
    <text x="80" y="272" fill="#a8b5aa" font-size="10" text-anchor="middle">the current by ≥ 0.15,</text>
    <text x="80" y="286" fill="#a8b5aa" font-size="10" text-anchor="middle">so villagers commit</text>
    <text x="80" y="300" fill="#a8b5aa" font-size="10" text-anchor="middle">instead of flickering.</text>
  </g>
</svg>
