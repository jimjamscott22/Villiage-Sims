<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="880" height="340" rx="16" fill="#17211b"/>
  <text x="28" y="40" fill="#f7f4e9" font-size="20" font-weight="700">Simulate at 20 Hz, render at 60 fps</text>
  <text x="28" y="62" fill="#a8b5aa" font-size="13">Between two sim ticks the renderer interpolates by alpha, so villagers glide instead of stepping.</text>

  <!-- Sim ticks track -->
  <text x="28" y="112" fill="#d96a3a" font-size="13" font-weight="700">SIM · 50 ms tick</text>
  <line x1="60" y1="150" x2="828" y2="150" stroke="#3a4d36" stroke-width="2"/>
  <g>
    <!-- tick nodes -->
    <g fill="#d96a3a">
      <circle cx="100" cy="150" r="9"/><circle cx="292" cy="150" r="9"/><circle cx="484" cy="150" r="9"/><circle cx="676" cy="150" r="9"/>
    </g>
    <g fill="#f7f4e9" font-size="11" text-anchor="middle">
      <text x="100" y="132">tick n</text><text x="292" y="132">n+1</text><text x="484" y="132">n+2</text><text x="676" y="132">n+3</text>
    </g>
    <g fill="#a8b5aa" font-size="10" text-anchor="middle">
      <text x="100" y="176">snapshot</text><text x="292" y="176">snapshot</text><text x="484" y="176">snapshot</text><text x="676" y="176">snapshot</text>
    </g>
  </g>

  <!-- interpolation window highlight -->
  <rect x="292" y="142" width="192" height="16" rx="8" fill="#e8a33d" fill-opacity="0.18"/>
  <text x="388" y="200" fill="#e8a33d" font-size="11" text-anchor="middle" font-weight="600">alpha = (now − t) / 50 ms</text>

  <!-- Render frames track -->
  <text x="28" y="244" fill="#5aa0d0" font-size="13" font-weight="700">RENDER · ~16 ms frame</text>
  <line x1="60" y1="278" x2="828" y2="278" stroke="#33474f" stroke-width="2"/>
  <g fill="#5aa0d0">
    <circle cx="100" cy="278" r="5"/><circle cx="164" cy="278" r="5"/><circle cx="228" cy="278" r="5"/>
    <circle cx="292" cy="278" r="5"/><circle cx="356" cy="278" r="5"/><circle cx="420" cy="278" r="5"/>
    <circle cx="484" cy="278" r="5"/><circle cx="548" cy="278" r="5"/><circle cx="612" cy="278" r="5"/>
    <circle cx="676" cy="278" r="5"/><circle cx="740" cy="278" r="5"/><circle cx="804" cy="278" r="5"/>
  </g>

  <!-- connectors from render frames in the window up to interp -->
  <g stroke="#5aa0d0" stroke-opacity="0.45" stroke-width="1.2" stroke-dasharray="3 3">
    <line x1="356" y1="273" x2="356" y2="158"/>
    <line x1="420" y1="273" x2="420" y2="158"/>
  </g>

  <!-- moving villager illustration inside window -->
  <g>
    <circle cx="292" cy="222" r="6" fill="#588a42" stroke="#2c5a2b" stroke-width="1.5"/>
    <circle cx="356" cy="222" r="6" fill="#7fae5b" stroke="#2c5a2b" stroke-width="1.5"/>
    <circle cx="420" cy="222" r="6" fill="#a9d07e" stroke="#2c5a2b" stroke-width="1.5"/>
    <circle cx="484" cy="222" r="6" fill="#588a42" stroke="#2c5a2b" stroke-width="1.5"/>
    <line x1="298" y1="222" x2="478" y2="222" stroke="#f7f4e9" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="3 4"/>
  </g>
  <text x="740" y="226" fill="#a8b5aa" font-size="10" text-anchor="middle">paused → alpha frozen at 1.0</text>
</svg>
